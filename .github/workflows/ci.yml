name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: |
          bun install --frozen-lockfile
          bun install --frozen-lockfile --cwd web

      - name: Typecheck daemon
        run: bunx tsc --noEmit

      - name: Build web
        run: bun run --cwd web build

      # Windows PowerShell 5.1 reads BOM-less .ps1 as ANSI and shreds multi-byte
      # characters into parse errors. Editors keep stripping the BOM, so gate it here.
      - name: Require UTF-8 BOM on all .ps1
        run: |
          bad=0
          for f in $(git ls-files '*.ps1'); do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" != "efbbbf" ]; then
              echo "missing UTF-8 BOM: $f"
              bad=1
            fi
          done
          exit $bad
